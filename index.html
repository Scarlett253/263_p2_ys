<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Can You See Me?</title>

    <link rel="stylesheet" href="./css/style.css" />

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/"
        }
      }
    </script>
  </head>

  <body>
    <div id="startScreen">
      <img
        id="startGif"
        src="assets/StartingScreen.gif"
        alt="Start screen background"
      />

      <h1 id="game-title">Can You See Me?</h1>
      <p id="instructions">Move with WASD & your mouse to look around</p>
      <p id="sub-instructions">Find the hidden presence before time runs out</p>

      <button id="startBtn">
        <img src="assets/StartButton.gif" alt="Start game" />
      </button>

      <p id="startLabel">Start your journey</p>
      <p id="credits">work by Yelena & Scarlett</p>
    </div>

    <div id="endScreen">
      <div id="endBox">
        <p id="message"></p>

        <img id="winGif" src="assets/win.gif" alt="Win screen gif" />
        <img id="loseGif" src="assets/lost.gif" alt="Lose screen gif" />

        <button id="restartBtn">Restart</button>
      </div>
    </div>

    <div id="ui">
      <p id="timer">Time: 60</p>
    </div>

    <video id="bg-video" autoplay muted loop playsinline>
      <source src="assets/MistForest.mp4" type="video/mp4" />
    </video>

    <script type="module" src="./js/main.js"></script>
  </body>
</html>
