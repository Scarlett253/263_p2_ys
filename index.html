<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Can You See Me?</title>

    <link rel="stylesheet" href="./css/style.css" />

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/"
        }
      }
    </script>
  </head>

  <body>
    <!-- START SCREEN -->
    <div id="startScreen">
      <video id="startVideo" autoplay muted loop playsinline>
        <source src="assets/StartingScreen.mp4" type="video/mp4" />
      </video>

      <h1>Can You See Me?</h1>
      <p>Move with WASD</p>
      <p>Find the hidden presence before time runs out</p>
      <button id="startBtn">Start</button>
    </div>

    <!-- END SCREEN -->
    <div id="endScreen">
      <div id="endBox">
        <p id="message"></p>
        <button id="restartBtn">Restart</button>
      </div>
    </div>

    <!-- GAME UI -->
    <div id="ui">
      <p id="timer">Time: 60</p>
    </div>

    <!-- GAME BACKGROUND VIDEO -->
    <video id="bg-video" autoplay muted loop playsinline>
      <source src="assets/MistForest.mp4" type="video/mp4" />
    </video>

    <script type="module" src="./js/main.js"></script>
  </body>
</html>
